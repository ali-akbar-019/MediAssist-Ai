<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="fTitle fDesc">
  <title id="fTitle">MediAssist favicon</title>
  <desc id="fDesc">A stylized medical cross with a heartbeat line on a navy-emerald gradient circle.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#g)"/>

  <!-- white medical cross -->
  <g transform="translate(0,0)" fill="#ffffff">
    <rect x="27" y="18" width="10" height="28" rx="2"/>
    <rect x="18" y="27" width="28" height="10" rx="2"/>
  </g>

  <!-- heartbeat line (light) positioned across the cross -->
  <polyline points="10,36 18,36 22,30 26,40 34,24 38,32 50,32" fill="none" stroke="#ecfdf5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
</svg>